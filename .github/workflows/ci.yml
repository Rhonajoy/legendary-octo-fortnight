name: CI/CD Pipeline

on:
  push:
    branches: [ "development", "production" ]
  pull_request:
    branches: [ "development", "production" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test -- --ci --watchAll=false

  deploy:
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to Vercel
        run: |
          if [ "${GITHUB_REF##*/}" = "production" ]; then
            npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            npx vercel --token=${{ secrets.VERCEL_TOKEN }}
          fi
